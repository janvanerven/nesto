services:
  backend:
    image: ghcr.io/janvanerven/nesto/backend:latest
    volumes:
      - nesto-data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  frontend:
    image: ghcr.io/janvanerven/nesto/frontend:latest
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  nginx:
    image: ghcr.io/janvanerven/nesto/nginx:latest
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  backup:
    image: alpine:3.21
    volumes:
      - nesto-data:/data:ro
      - ./backups:/backup
    entrypoint: >
      sh -c 'apk add --no-cache sqlite rsync && while true; do
        sqlite3 /data/nesto.db ".backup /backup/nesto-$$(date +%Y%m%d-%H%M).db";
        if [ -d /data/documents ]; then
          rsync -a --delete /data/documents/ /backup/documents/;
        fi;
        find /backup -name "*.db" -mtime +7 -delete;
        sleep 86400;
      done'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

volumes:
  nesto-data:
